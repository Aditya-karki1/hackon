services:
  # ── Backend (Node.js API) ─────────────────────────────────────
  - type: web
    name: hackon-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: MONGO_URI
        sync: false        # Set this in Render dashboard → your MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false        # Set a strong random string in Render dashboard
      - key: PORT
        value: 5001
      - key: FRONTEND_URL
        sync: false        # Set to your Render frontend URL after it's deployed

  # ── Frontend (React Static Site) ─────────────────────────────
  - type: web
    name: hackon-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false        # Set to your Render backend URL in the dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
